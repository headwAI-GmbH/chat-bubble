name: Chat Bubble Widget E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'package.json'
      - 'vite.config.js'
      - '.github/workflows/widget-e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'package.json'
      - 'vite.config.js'
  workflow_dispatch:
    inputs:
      test_project:
        description: 'Test project to run (headwaione, openwebui, or both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - headwaione
          - openwebui

env:
  NODE_VERSION: '18'

jobs:
  test-headwaione:
    name: Test with HeadwAI ONE Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.test_project != 'openwebui'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install E2E test dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Start Docker services for HeadwAI ONE
        working-directory: e2e
        run: |
          docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml up --build -d

          # Wait for mock-llm to be healthy
          timeout=120
          while [ $timeout -gt 0 ]; do
            if docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml ps mock-llm | grep -q "(healthy)"; then
              echo "Mock LLM service is healthy"
              break
            fi
            echo "Waiting for Mock LLM service... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "Mock LLM service failed to become healthy"
            docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml logs mock-llm
            exit 1
          fi

          # Wait for backend to be healthy
          timeout=300
          while [ $timeout -gt 0 ]; do
            if curl -sf http://localhost:8085/health >/dev/null 2>&1; then
              echo "HeadwAI ONE backend is ready"
              break
            fi
            echo "Waiting for HeadwAI ONE backend... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "HeadwAI ONE backend failed to start"
            docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml logs
            exit 1
          fi

          # Wait for chat bubble widget server
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -sf http://localhost:5174 >/dev/null 2>&1; then
              echo "Chat Bubble server is ready"
              break
            fi
            echo "Waiting for Chat Bubble server... ($timeout seconds remaining)"
            sleep 2
            timeout=$((timeout - 2))
          done

          if [ $timeout -le 0 ]; then
            echo "Chat Bubble server failed to start"
            docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml logs chat-bubble-dev
            exit 1
          fi

      - name: Run Playwright tests with HeadwAI ONE
        working-directory: e2e
        run: E2E_CONTAINER_NAME=headwaione-backend-e2e npx playwright test --config=playwright.headwaione.config.ts
        env:
          CI: true

      - name: Docker logs on failure
        working-directory: e2e
        if: failure()
        run: docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml logs

      - name: Stop Docker services
        working-directory: e2e
        if: always()
        run: docker compose -f docker-compose.yml -f headwaione/docker-compose.override.yml down -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: headwaione-test-results
          path: |
            e2e/headwaione/test-results/
            e2e/headwaione/playwright-report/
          retention-days: 7

  test-openwebui:
    name: Test with Open WebUI Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.test_project != 'headwaione'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install E2E test dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium firefox

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Start Docker services for Open WebUI
        working-directory: e2e
        run: |
          docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml up --build -d

          # Wait for mock-llm to be healthy
          timeout=120
          while [ $timeout -gt 0 ]; do
            if docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml ps mock-llm | grep -q "(healthy)"; then
              echo "Mock LLM service is healthy"
              break
            fi
            echo "Waiting for Mock LLM service... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "Mock LLM service failed to become healthy"
            docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml logs mock-llm
            exit 1
          fi

          # Wait for backend to be healthy
          timeout=300
          while [ $timeout -gt 0 ]; do
            if curl -sf http://localhost:8085/health >/dev/null 2>&1; then
              echo "Open WebUI backend is ready"
              break
            fi
            echo "Waiting for Open WebUI backend... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "Open WebUI backend failed to start"
            docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml logs
            exit 1
          fi

          # Wait for chat bubble widget server
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -sf http://localhost:5174 >/dev/null 2>&1; then
              echo "Chat Bubble server is ready"
              break
            fi
            echo "Waiting for Chat Bubble server... ($timeout seconds remaining)"
            sleep 2
            timeout=$((timeout - 2))
          done

          if [ $timeout -le 0 ]; then
            echo "Chat Bubble server failed to start"
            docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml logs chat-bubble-dev
            exit 1
          fi

      - name: Run Playwright tests with Open WebUI
        working-directory: e2e
        run: E2E_CONTAINER_NAME=openwebui-backend-e2e npx playwright test --config=playwright.openwebui.config.ts
        env:
          CI: true

      - name: Docker logs on failure
        working-directory: e2e
        if: failure()
        run: docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml logs

      - name: Stop Docker services
        working-directory: e2e
        if: always()
        run: docker compose -f docker-compose.yml -f openwebui/docker-compose.override.yml down -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: openwebui-test-results
          path: |
            e2e/openwebui/test-results/
            e2e/openwebui/playwright-report/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-headwaione, test-openwebui]
    if: always()

    steps:
      - name: Display test results
        run: |
          echo "## Chat Bubble Widget E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-headwaione.result }}" = "success" ]; then
            echo "✅ HeadwAI ONE backend tests: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-headwaione.result }}" = "failure" ]; then
            echo "❌ HeadwAI ONE backend tests: **FAILED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-headwaione.result }}" = "skipped" ]; then
            echo "⏭️ HeadwAI ONE backend tests: **SKIPPED**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-openwebui.result }}" = "success" ]; then
            echo "✅ Open WebUI backend tests: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-openwebui.result }}" = "failure" ]; then
            echo "❌ Open WebUI backend tests: **FAILED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-openwebui.result }}" = "skipped" ]; then
            echo "⏭️ Open WebUI backend tests: **SKIPPED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test artifacts are available for failed runs." >> $GITHUB_STEP_SUMMARY
